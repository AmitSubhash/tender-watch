# TenderWatch configuration.
# Edit keywords/portals freely; the scraper stores everything it sees,
# keywords only control what is highlighted on the dashboard and pushed
# to your phone. Run `.venv/bin/python run.py --rematch` after changing
# keywords to re-flag tenders already in the database.

database: data/tenders.db

scrape:
  request_delay_seconds: 0.4
  timeout_seconds: 45
  retries: 2
  max_workers: 6          # portals scraped in parallel, requests within a portal are serial
  cppp_max_pages: 40      # CPPP aggregate feed pages per run (9 tenders per page)
  cppp_min_pages: 3       # always fetch at least this many pages before early-stop
  max_org_pages: 30       # safety cap if an org directory paginates

filters:
  match_organisation: false   # also match keywords against the organisation chain
  include_keywords:
    - road
    - roads
    - highway
    - expressway
    - bridge
    - flyover
    - culvert
    - bituminous
    - bitumen
    - asphalt
    - pavement
    - carriageway
    - widening
    - laning
    - four lane
    - two lane
    - runway
    - taxiway
    - apron
    - viaduct
    - embankment
    - resurfacing
    - strengthening of road
    - periodic renewal
    - upgradation of road
    - improvement of road
    - pmgsy
    - cement concrete road
    - cc road
    - wbm
    - rob
    - rub
    # transliterated Hindi/Marathi road terms (common in rural tenders)
    - rasta
    - rsta
    - sadak
    - khadikaran
    - murumikaran
    - dambarikaran
    - "डांबरीकरण"
    - "सड़क"
    - "मार्ग"
    - "पुल"
    - "डामरीकरण"
    - "चौड़ीकरण"
  exclude_keywords: []        # e.g. [streetlight, pipeline] to suppress false positives

dashboard:
  output: dashboard/index.html
  max_rows: 1500
  new_badge_hours: 48

notify:
  enabled: true
  command: push-to-phone     # uses your existing ntfy channel
  max_titles: 3              # how many tender titles to include in the push body

portals:
  # ---- GePNIC portals (verified working, captcha-free org-directory route) ----
  - id: etenders_central
    name: Central eTenders (MoRTH, NHAI, NHIDCL, ministries)
    type: gepnic
    app_url: https://etenders.gov.in/eprocure/app
    enabled: true
  - id: mahatenders
    name: Maharashtra (mahatenders.gov.in)
    type: gepnic
    app_url: https://mahatenders.gov.in/nicgep/app
    enabled: true
  - id: mptenders
    name: Madhya Pradesh (mptenders.gov.in)
    type: gepnic
    app_url: https://mptenders.gov.in/nicgep/app
    enabled: true
  - id: up
    name: Uttar Pradesh (etender.up.nic.in, incl. UPPWD)
    type: gepnic
    app_url: https://etender.up.nic.in/nicgep/app
    enabled: true
  - id: kerala
    name: Kerala (etenders.kerala.gov.in)
    type: gepnic
    app_url: https://etenders.kerala.gov.in/nicgep/app
    enabled: true
  - id: odisha
    name: Odisha (tendersodisha.gov.in)
    type: gepnic
    app_url: https://tendersodisha.gov.in/nicgep/app
    enabled: true
  - id: tamilnadu
    name: Tamil Nadu (tntenders.gov.in)
    type: gepnic
    app_url: https://tntenders.gov.in/nicgep/app
    enabled: true
  - id: defproc
    name: Defence Procurement (BRO, MES via defproc.gov.in)
    type: gepnic
    app_url: https://defproc.gov.in/nicgep/app
    enabled: true

  # ---- CPPP aggregate feed (central CPSUs: NTPC, ONGC, AAI, ARMY, MES, ...) ----
  - id: cppp_agg
    name: CPPP aggregate (central CPSUs and defence)
    type: cppp
    list_url: https://eprocure.gov.in/cppp/latestactivetendersnew/cpppdata
    enabled: true

  # ---- Not yet supported (JavaScript portals, need a camofox-based adapter) ----
  - id: telangana
    name: Telangana eProcurement
    type: unsupported
    app_url: https://tender.telangana.gov.in
    enabled: false
  - id: ap
    name: Andhra Pradesh eProcurement
    type: unsupported
    app_url: https://tender.apeprocurement.gov.in
    enabled: false
  - id: karnataka
    name: Karnataka eProc
    type: unsupported
    app_url: https://eproc.karnataka.gov.in
    enabled: false
  - id: chhattisgarh
    name: Chhattisgarh eProc
    type: unsupported
    app_url: https://eproc.cgstate.gov.in
    enabled: false
  - id: gujarat
    name: Gujarat (nprocure.com)
    type: unsupported
    app_url: https://www.nprocure.com
    enabled: false
  - id: gem
    name: GeM bid search (goods/services)
    type: unsupported
    app_url: https://bidplus.gem.gov.in/all-bids
    enabled: false
