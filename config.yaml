# HINCOL TenderWatch configuration.
#
# Tuned for Hindustan Colas (HINCOL): bitumen emulsions, modified bitumen
# (CRMB/PMB/NRMB), microsurfacing, cold mix and allied bituminous products
# for road and airfield pavements. The scraper stores every tender it sees;
# the keyword tiers below control how tenders are flagged, prioritised on
# the dashboard, and which ones trigger phone alerts.
#
# After editing keywords run `.venv/bin/python run.py --rematch` to re-flag
# tenders already in the database.

database: data/tenders.db

scrape:
  request_delay_seconds: 0.7   # polite pacing; NIC soft-throttles aggressive IPs
  timeout_seconds: 45
  retries: 2
  max_workers: 5          # portals scraped in parallel, requests within a portal are serial
  cppp_max_pages: 40      # CPPP aggregate feed pages per run (9 tenders per page)
  cppp_min_pages: 3       # always fetch at least this many pages before early-stop
  max_org_pages: 30       # safety cap if an org directory paginates
  force_redrill_hours: 24 # re-scan every org at least this often, even if its
                          # count is unchanged, to catch same-count churn

filters:
  match_organisation: false   # also match keywords against the organisation chain

  # Tier 1 (PRODUCT): the tender names a HINCOL product or bituminous binder.
  # These are the highest-value leads because HINCOL's materials are directly
  # specified. They get earlier and louder alerts.
  product_keywords:
    - bitumen
    - bituminous
    - bitumen emulsion
    - emulsion
    - cationic
    - anionic
    - modified bitumen
    - crmb
    - pmb
    - nrmb
    - crumb rubber
    - rubberised bitumen
    - polymer modified
    - microsurfacing
    - micro surfacing
    - micro-surfacing
    - cold mix
    - slurry seal
    - surface dressing
    - tack coat
    - prime coat
    - pothole
    - pot hole
    - pot-hole
    - pothole repair
    - patch work
    - patchwork
    - mastic asphalt
    - asphalt
    - asphaltic concrete
    - bituminous concrete
    - dense bituminous macadam
    - dbm
    - bituminous macadam
    - vg10
    - vg30
    - vg40
    - vg-10
    - vg-30
    - vg-40

  # Tier 2 (ROAD): general road/pavement work. HINCOL binders are likely
  # required even when not named, so these are leads worth tracking.
  road_keywords:
    - road
    - roads
    - highway
    - expressway
    - bridge
    - flyover
    - culvert
    - pavement
    - carriageway
    - widening
    - laning
    - four lane
    - two lane
    - runway
    - taxiway
    - apron
    - airfield
    - viaduct
    - embankment
    - resurfacing
    - surfacing
    - road repair
    - repair of road
    - pavement repair
    - road maintenance
    - maintenance of road
    - strengthening of road
    - periodic renewal
    - upgradation of road
    - improvement of road
    - pmgsy
    - cement concrete road
    - cc road
    - wbm
    - rob
    - rub
    - black topping
    - blacktopping
    - metalling
    # transliterated Hindi/Marathi road terms (common in rural tenders)
    - rasta
    - rsta
    - sadak
    - khadikaran
    - murumikaran
    - dambarikaran
    - "सड़क"
    - "मार्ग"
    - "पुल"
    - "डांबरीकरण"

  exclude_keywords: []        # e.g. [streetlight, pipeline] to suppress false positives

deadline:
  # "Get tenders at the right time": push an alert when a flagged tender is
  # still open but its bid-submission deadline is approaching, so HINCOL's
  # team can respond before the window closes. Product-tier tenders get a
  # longer lead time. Each tender is alerted at most once.
  road_within_days: 5
  product_within_days: 10

dashboard:
  brand: HINCOL TenderWatch
  subtitle: Bituminous and road tenders across HINCOL plant and depot states
  output: dashboard/index.html
  max_rows: 2000
  new_badge_hours: 48

notify:
  enabled: true
  command: push-to-phone     # local CLI; cloud uses NTFY_TOPIC env var
  max_titles: 3              # how many tender titles to include in the push body

# HINCOL has 10 bitumen/emulsion plants (Maharashtra, UP, Haryana, Gujarat,
# Karnataka, Tamil Nadu, Andhra Pradesh, West Bengal, Assam) and 27 depots
